substitutions:
  name: "SSS"

esphome:
  name: ${name}
  friendly_name: "SSS_TopUnit"
  name_add_mac_suffix: true
  libraries:
    - ArduinoJson

on_boot:
  priority: 600 
  then:
    - lambda: |-
        std::string m = get_mac_address();
        std::string c = "";
        for(char ch : m) { if(ch != ':') c += ch; }
        id(clean_mac) = c;
        ESP_LOGI("SSS_INIT", "Top Unit ID generated: %s", id(clean_mac).c_str());
    - if:
        condition:
          wifi.connected:
        then:
          - script.execute: sync_status

esp32:
  board: esp32dev
  framework:
    type: arduino

# --- DYNAMIC WI-FI (CAPTIVE PORTAL) ---
wifi:
  ap:
    ssid: "SSS_TopUnit"
    password: "savewater"

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    servers: [ "0.pool.ntp.org" ]

logger:
  level: DEBUG
  baud_rate: 115200

globals:
  - id: clean_mac
    type: std::string
    initial_value: '""'
  - id: firebase_url_saved
    type: std::string
    restore_value: yes
    initial_value: '"https://waiting-for-setup.firebaseio.com"'

http_request:
  id: firebase_http
  timeout: 10s

# --- BINARY SENSORS (Overhead Tank Levels) ---
binary_sensor:
  - platform: gpio
    pin: { number: 32, mode: INPUT_PULLUP, inverted: true }
    name: "Top Level 25%"
    id: level_25
    on_state:
      - script.execute: sync_status

  - platform: gpio
    pin: { number: 33, mode: INPUT_PULLUP, inverted: true }
    name: "Top Level 50%"
    id: level_50
    on_state:
      - script.execute: sync_status

  - platform: gpio
    pin: { number: 25, mode: INPUT_PULLUP, inverted: true }
    name: "Top Level 75%"
    id: level_75
    on_state:
      - script.execute: sync_status

  - platform: gpio
    pin: { number: 26, mode: INPUT_PULLUP, inverted: true }
    name: "Top Level 100%"
    id: level_100
    on_state:
      - script.execute: sync_status

  - platform: gpio
    pin: { number: 13, mode: INPUT_PULLUP }
    id: top_flow_sensor
    name: "Top Tank Incoming Flow"
    on_state:
      - script.execute: sync_status

# --- CORE LOGIC SCRIPTS ---
script:
  - id: sync_status
    mode: restart
    then:
      - http_request.send:
          method: PATCH
          url: !lambda |-
            return id(firebase_url_saved) + "/units/" + id(clean_mac) + "/status.json";
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            std::string payload = "{";
            payload += "\"mac_id\":\"" + id(clean_mac) + "\",";
            payload += "\"unit_name\":\"TopUnit\","; 
            payload += "\"level_25\":" + std::string(id(level_25).state ? "true" : "false") + ",";
            payload += "\"level_50\":" + std::string(id(level_50).state ? "true" : "false") + ",";
            payload += "\"level_75\":" + std::string(id(level_75).state ? "true" : "false") + ",";
            payload += "\"level_100\":" + std::string(id(level_100).state ? "true" : "false") + ",";
            payload += "\"flow_active\":" + std::string(id(top_flow_sensor).state ? "true" : "false");
            payload += "}";
            return payload; 

# --- HEARTBEAT SYNC ---
interval:
  - interval: 25s
    then:
      - script.execute: sync_status
