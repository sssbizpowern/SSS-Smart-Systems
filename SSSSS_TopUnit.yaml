substitutions:
  name: "top-unit"

esphome:
  name: ${name}
  friendly_name: "Top Unit Water Alarm"
  on_boot:
    priority: -100 
    then:
      - wait_until:
          wifi.connected:
      - delay: 5s
      - lambda: |-
          std::string m = get_mac_address();
          std::string c = "";
          for(char ch : m) { if(ch != ':') c += ch; }
          id(clean_mac) = c;
      - script.execute: sync_status

esp8266:
  board: nodemcuv2

# CRITICAL: Disable hardware serial to safely use RX/TX pins for 60% and 80% sensors
logger:
  level: DEBUG
  baud_rate: 0

wifi:
  ap:
    ssid: "Top Unit"
    password: "savewater"

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    servers: [ "0.pool.ntp.org" ]

globals:
  - id: clean_mac
    type: std::string
    initial_value: '""'
  - id: flow_error_active
    type: bool
    initial_value: 'false'
  - id: remote_motor_on
    type: bool
    initial_value: 'false'
  - id: target_esp32_mac
    type: std::string
    initial_value: '"A1B2C3D4E5F6"' # Replace with your actual Sump Unit MAC for testing

http_request:
  id: firebase_http
  timeout: 10s
  verify_ssl: false

binary_sensor:
  # --- WATER LEVEL SENSORS ---
  - platform: gpio
    pin: {number: 5, mode: INPUT_PULLUP, inverted: true} # D1
    name: "Level 20%"
    id: level_20
    filters: {delayed_on_off: 500ms}
    on_state: {script.execute: sync_status}
      
  - platform: gpio
    pin: {number: 4, mode: INPUT_PULLUP, inverted: true} # D2
    name: "Level 40%"
    id: level_40
    filters: {delayed_on_off: 500ms}
    on_state: {script.execute: sync_status}
      
  - platform: gpio
    pin: {number: 12, mode: INPUT_PULLUP, inverted: true} # D6
    name: "Level 50%"
    id: level_50
    filters: {delayed_on_off: 500ms}
    on_state: {script.execute: sync_status}

  - platform: gpio
    pin: {number: 3, mode: INPUT_PULLUP, inverted: true} # RX PIN
    name: "Level 60%"
    id: level_60
    filters: {delayed_on_off: 500ms}
    on_state: {script.execute: sync_status}
      
  - platform: gpio
    pin: {number: 1, mode: INPUT_PULLUP, inverted: true} # TX PIN
    name: "Level 80%"
    id: level_80
    filters: {delayed_on_off: 500ms}
    on_state: {script.execute: sync_status}
      
  - platform: gpio
    pin: {number: 2, mode: INPUT_PULLUP, inverted: true} # D4 (WARNING: BOOT PIN)
    name: "Level 100%"
    id: level_100
    filters: {delayed_on_off: 500ms}
    on_state: 
      - script.execute: sync_status
      - script.execute:
          id: send_emergency
          message: "CRITICAL: TANK 100% FULL"

  # --- FLOW SENSORS ---
  - platform: gpio
    pin: {number: 13, mode: INPUT_PULLUP, inverted: true} # D7
    id: flow_low
    name: "Flow Low"
    filters: {delayed_on_off: 500ms}
    on_state: 
      - script.execute: sync_status
      - script.execute: check_flow_logic

  - platform: gpio
    pin: {number: 14, mode: INPUT_PULLUP, inverted: true} # D5
    id: flow_med  
    name: "Flow Medium"
    filters: {delayed_on_off: 500ms}
    on_state: 
      - script.execute: sync_status
      - script.execute: check_flow_logic

  - platform: gpio
    pin: {number: 16, mode: INPUT} # D0 (WARNING: Must use external 10k resistor to 3.3V)
    id: flow_high 
    name: "Flow High"
    filters: {delayed_on_off: 500ms}
    on_state: 
      - script.execute: sync_status
      - script.execute: check_flow_logic

# --- CORE LOGIC SCRIPTS ---
script:
  - id: sync_status
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(clean_mac).length() > 10;
          then:
            - http_request.send:
                method: PATCH
                url: !lambda |-
                  return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/status.json");
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                 std::string payload = "{";
                  // 1. Identifying the hardware
                  payload += "\"mac_id\":\"" + id(clean_mac) + "\",";
                  // 2. Identifying the role
                  payload += "\"unit_name\":\"TopUnit\","; 
                  // 3. Sensor Data
                  payload += "\"level_20\":" + std::string(id(level_20).state ? "true" : "false") + ",";
                  payload += "\"level_40\":" + std::string(id(level_40).state ? "true" : "false") + ",";
                  payload += "\"level_50\":" + std::string(id(level_50).state ? "true" : "false") + ",";
                  payload += "\"level_60\":" + std::string(id(level_60).state ? "true" : "false") + ",";
                  payload += "\"level_80\":" + std::string(id(level_80).state ? "true" : "false") + ",";
                  payload += "\"level_100\":" + std::string(id(level_100).state ? "true" : "false") + ",";
                  payload += "\"flow_low\":" + std::string(id(flow_low).state ? "true" : "false") + ",";
                  payload += "\"flow_med\":" + std::string(id(flow_med).state ? "true" : "false") + ",";
                  payload += "\"flow_high\":" + std::string(id(flow_high).state ? "true" : "false");
                  payload += "}";
                  return payload; 

  - id: send_emergency
    parameters:
      message: string
    then:
      - if:
          condition:
            lambda: return id(clean_mac).length() > 10;
          then:
            - http_request.send:
                method: PATCH
                url: !lambda |-
                  return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/alerts.json");
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                  return std::string("{\"last_emergency\":\"") + message + "\"}";

  - id: clear_emergency
    then:
      - http_request.send:
          method: DELETE
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/alerts.json");

  - id: check_flow_logic
    then:
      - lambda: |-
          bool bad_flow = !id(flow_med).state && !id(flow_high).state; 
          
          if (id(remote_motor_on) && bad_flow) {
            if (!id(flow_error_active)) {
              id(send_emergency).execute("CRITICAL: MOTOR ON BUT NO/LOW WATER FLOW");
              id(flow_error_active) = true;
            }
          } else {
            if (id(flow_error_active)) {
              id(clear_emergency).execute();
              id(flow_error_active) = false;
            }
          }

# --- TIME-BASED SYNC & POLLING ---
interval:
  # 1. Heartbeat Sync: Forces Firebase to update every 25 seconds
  - interval: 25s
    then:
      - script.execute: sync_status

  # 2. Config Fetcher: Downloads the Target ESP32 MAC from Flutter app every 30s
  - interval: 30s
    then:
      - http_request.get:
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/config.json");
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (body == "null" || body.length() < 5) return; 
                  
                  JsonDocument doc; 
                  DeserializationError err = deserializeJson(doc, body);
                  
                  if (!err && !doc["target_esp32_mac"].isNull()) {
                    std::string fetched_mac = doc["target_esp32_mac"].as<std::string>();
                    
                    if (fetched_mac.length() > 10 && id(target_esp32_mac) != fetched_mac) {
                      id(target_esp32_mac) = fetched_mac;
                    }
                  }

  # 3. Remote Motor Poller: Checks the ESP32 status every 5s (Only runs if MAC is configured)
  - interval: 5s
    then:
      - if:
          condition:
            lambda: return id(target_esp32_mac).length() > 10;
          then:
            - http_request.get:
                url: !lambda |-
                  return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(target_esp32_mac) + std::string("/status.json");
                capture_response: true 
                on_response:
                  then:
                    - lambda: |-
                        if (body == "null" || body.length() < 10) return; 
                        
                        JsonDocument doc; 
                        DeserializationError err = deserializeJson(doc, body);
                        
                        if (!err) {
                          bool borewell_on = doc["borewell_ldr_active"].as<bool>();
                          bool sump_on = doc["sump_ldr_active"].as<bool>();
                          
                          id(remote_motor_on) = (borewell_on || sump_on);
                          id(check_flow_logic).execute();
                        }