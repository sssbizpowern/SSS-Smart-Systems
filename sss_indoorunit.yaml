substitutions:
  name: "wlwateralarm"

esphome:
  name: ${name}
  friendly_name: "Water Level Alarm"
  libraries:
    - ArduinoJson
  on_boot:
    priority: -100 # This makes it run AFTER Wi-Fi is fully connected
    then:
      - wait_until:
          wifi.connected:
      - delay: 5s
      - lambda: |-
          std::string m = get_mac_address();
          std::string c = "";
          for(char ch : m) { if(ch != ':') c += ch; }
          id(clean_mac) = c;
      - script.execute: sync_status

esp32:
  board: esp32dev
  framework:
    type: arduino

# --- DYNAMIC WI-FI (CAPTIVE PORTAL) ---
wifi:
  ap:
    ssid: "SSS_IndoorUnit"
    password: "savewater"

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    servers: [ "0.pool.ntp.org" ]

logger:
  level: DEBUG
  baud_rate: 115200

globals:
  - id: clean_mac
    type: std::string
    initial_value: '""'
  - id: flow_error_active
    type: bool
    initial_value: 'false'
  - id: firebase_url_saved
    type: std::string
    restore_value: yes
    initial_value: '"https://waiting-for-setup.firebaseio.com"'

http_request:
  id: firebase_http
  timeout: 10s

# --- RELAYS ---
switch:
  - platform: gpio
    pin: 22 
    id: borewell_relay
    name: "Borewell Relay"
  - platform: gpio
    pin: 23 
    id: sump_relay
    name: "Sump Relay"

# --- LDR SENSORS ---
sensor:
  - platform: adc
    pin: 34 
    id: borewell_ldr
    name: "Borewell Light"
    attenuation: 12db 
    update_interval: 2s # Sped up to 2 seconds for faster response
    on_value_range:
      - above: 1.5
        then:
          - script.execute: check_flow_logic
      - below: 1.49
        then:
          - script.execute: check_flow_logic

  - platform: adc
    pin: 35 
    id: sump_ldr
    name: "Sump Light"
    attenuation: 12db 
    update_interval: 2s # Sped up to 2 seconds for faster response
    on_value_range:
      - above: 1.5
        then:
          - script.execute: check_flow_logic
      - below: 1.49
        then:
          - script.execute: check_flow_logic

# --- BINARY SENSORS (Level & Flow) ---
binary_sensor:
  - platform: gpio
    pin: 
      number: 32
      mode: INPUT_PULLUP
      inverted: true 
    name: "Level 25%"
    id: level_25
    filters:
      - delayed_on_off: 500ms
    on_state:
      - script.execute: sync_status
      
  - platform: gpio
    pin: 
      number: 33
      mode: INPUT_PULLUP
      inverted: true
    name: "Level 50%"
    id: level_50
    filters:
      - delayed_on_off: 500ms
    on_state:
      - script.execute: sync_status
      
  - platform: gpio
    pin: 
      number: 25
      mode: INPUT_PULLUP
      inverted: true
    name: "Level 75%"
    id: level_75
    filters:
      - delayed_on_off: 500ms
    on_state:
      - script.execute: sync_status
      
  - platform: gpio
    pin: 
      number: 26
      mode: INPUT_PULLUP
      inverted: true
    name: "Level 100%"
    id: level_100
    filters:
      - delayed_on_off: 500ms
    on_state:
      - script.execute: sync_status

  # --- FLOW SENSORS (These must have these IDs for the script to work) ---
  - platform: gpio
    pin: 13 
    id: flow_low
    name: "Flow Low"
    filters:
      - delayed_on_off: 500ms

  - platform: gpio
    pin: 14 
    id: flow_med  # <--- The ID the script was missing!
    name: "Flow Medium"
    filters:
      - delayed_on_off: 500ms

  - platform: gpio
    pin: 16 
    id: flow_high # <--- The ID the script was missing!
    name: "Flow High"
    filters:
      - delayed_on_off: 500ms
# --- CORE LOGIC SCRIPTS ---
script:
  - id: sync_status
    mode: restart
    then:
      - http_request.send:
          method: PATCH
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/status.json");
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            std::string payload = "{";
                  // 1. Identifying the hardware
                  payload += "\"mac_id\":\"" + id(clean_mac) + "\",";
                  // 2. Identifying the role
                  payload += "\"unit_name\":\"SumpUnit\","; 
                  // 3. Sensor Data
            payload += "\"level_25\":" + std::string(id(level_25).state ? "true" : "false") + ",";
            payload += "\"level_50\":" + std::string(id(level_50).state ? "true" : "false") + ",";
            payload += "\"level_75\":" + std::string(id(level_75).state ? "true" : "false") + ",";
            payload += "\"level_100\":" + std::string(id(level_100).state ? "true" : "false") + ",";
            payload += "\"borewell_ldr_active\":" + std::string(id(borewell_ldr).state > 1.5 ? "true" : "false") + ",";
            payload += "\"sump_ldr_active\":" + std::string(id(sump_ldr).state > 1.5 ? "true" : "false") + ",";
            payload += "\"flow_low\":" + std::string(id(flow_low).state ? "true" : "false") + ",";
            payload += "\"flow_med\":" + std::string(id(flow_med).state ? "true" : "false") + ",";
            payload += "\"flow_high\":" + std::string(id(flow_high).state ? "true" : "false");
            payload += "}";
            return payload; 

  - id: send_emergency
    parameters:
      message: string
    then:
      - http_request.send:
          method: PATCH
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/alerts.json");
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            return std::string("{\"last_emergency\":\"") + message + "\"}";

  - id: clear_emergency
    then:
      - http_request.send:
          method: DELETE
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/alerts.json");

  - id: check_flow_logic
    then:
      - script.execute: sync_status
      - lambda: |-
          bool motor_on = (id(borewell_ldr).state > 1.5) || (id(sump_ldr).state > 1.5);
          bool bad_flow = !id(flow_med).state && !id(flow_high).state; 
          
          if (motor_on && bad_flow) {
            if (!id(flow_error_active)) {
              id(send_emergency).execute("CRITICAL: MOTOR ON BUT NO/LOW WATER FLOW");
              id(flow_error_active) = true;
            }
          } else {
            if (id(flow_error_active)) {
              id(clear_emergency).execute();
              id(flow_error_active) = false;
            }
          }

  - id: run_borewell_timer
    parameters:
      duration_sec: int
    then:
      - switch.turn_on: borewell_relay
      - delay: !lambda "return duration_sec * 1000;"
      - switch.turn_off: borewell_relay

  - id: run_sump_timer
    parameters:
      duration_sec: int
    then:
      - switch.turn_on: sump_relay
      - delay: !lambda "return duration_sec * 1000;"
      - switch.turn_off: sump_relay

  - id: clear_firebase_command
    then:
      - http_request.send:
          method: DELETE
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/command.json");
# --- TIME-BASED SYNC & POLLING ---
interval:
  # 1. Heartbeat Sync: Forces Firebase to update every 25 seconds
  - interval: 25s
    then:
      - script.execute: sync_status

  # 2. Remote Command Poller: Checks for app commands every 5 seconds
  - interval: 5s
    then:
      - http_request.get:
          url: !lambda |-
            return std::string("https://wlwateralarm-default-rtdb.firebaseio.com/units/") + id(clean_mac) + std::string("/command.json");
          capture_response: true 
          on_response:
            then:
              - lambda: |-
                  if (body.length() < 10) return; 
                  
                  JsonDocument doc; 
                  DeserializationError err = deserializeJson(doc, body);
                  
                  if (!err && !doc["motor"].isNull()) {
                    std::string motor = doc["motor"].as<std::string>();
                    std::string state = doc["state"].as<std::string>();
                    int duration = doc["duration"].as<int>(); 
                    
                    if (motor == "borewell") {
                      if (state == "on") { id(run_borewell_timer).execute(duration > 0 ? duration : 60); }
                      else if (state == "off") { id(borewell_relay)->turn_off(); }
                    } 
                    else if (motor == "sump") {
                      if (state == "on") { id(run_sump_timer).execute(duration > 0 ? duration : 60); }
                      else if (state == "off") { id(sump_relay)->turn_off(); }
                    }
                    
                    id(clear_firebase_command).execute();
                  }
