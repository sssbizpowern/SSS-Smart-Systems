# --- UPDATED SSSSS_INDOORUNIT.YAML ---

substitutions:
  name: "SSS"

esphome:
  name: ${name}
  friendly_name: "SSS_IndoorUnit"
  name_add_mac_suffix: true
  libraries:
    - ArduinoJson

on_boot:
  priority: 600 
  then:
    - lambda: |-
        std::string m = get_mac_address();
        std::string c = "";
        for(char ch : m) { if(ch != ':') c += ch; }
        id(clean_mac) = c;
        ESP_LOGI("SSS_INIT", "Device ID generated: %s", id(clean_mac).c_str());
    - if:
        condition:
          wifi.connected:
        then:
          - script.execute: sync_status

esp32:
  board: esp32dev
  framework:
    type: arduino

# --- DYNAMIC WI-FI (CAPTIVE PORTAL) ---
wifi:
  ap:
    ssid: "SSS_IndoorUnit"
    password: "savewater"

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    servers: [ "0.pool.ntp.org" ]

logger:
  level: DEBUG
  baud_rate: 115200

globals:
  - id: clean_mac
    type: std::string
    initial_value: '""'
  - id: flow_error_active
    type: bool
    initial_value: 'false'
  - id: firebase_url_saved
    type: std::string
    restore_value: yes
    # This acts as the default if no setup has happened yet
    initial_value: '"https://waiting-for-setup.firebaseio.com"'

http_request:
  id: firebase_http
  timeout: 10s

# --- RELAYS & SENSORS (Keeping your existing pins) ---
# [Keep your switch and sensor blocks exactly as they are in your snippet]

# --- UPDATED CORE LOGIC SCRIPTS ---
script:
  - id: sync_status
    mode: restart
    then:
      - http_request.send:
          method: PATCH
          url: !lambda |-
            // Dynamically build the URL using the SAVED global variable
            return id(firebase_url_saved) + "/units/" + id(clean_mac) + "/status.json";
          request_headers:
            Content-Type: application/json
          body: !lambda |-
            std::string payload = "{";
            payload += "\"mac_id\":\"" + id(clean_mac) + "\",";
            payload += "\"unit_name\":\"SumpUnit\","; 
            payload += "\"level_25\":" + std::string(id(level_25).state ? "true" : "false") + ",";
            payload += "\"level_50\":" + std::string(id(level_50).state ? "true" : "false") + ",";
            payload += "\"level_75\":" + std::string(id(level_75).state ? "true" : "false") + ",";
            payload += "\"level_100\":" + std::string(id(level_100).state ? "true" : "false") + ",";
            payload += "\"borewell_ldr_active\":" + std::string(id(borewell_ldr).state > 1.5 ? "true" : "false") + ",";
            payload += "\"sump_ldr_active\":" + std::string(id(sump_ldr).state > 1.5 ? "true" : "false") + ",";
            payload += "\"flow_low\":" + std::string(id(flow_low).state ? "true" : "false") + ",";
            payload += "\"flow_med\":" + std::string(id(flow_med).state ? "true" : "false") + ",";
            payload += "\"flow_high\":" + std::string(id(flow_high).state ? "true" : "false");
            payload += "}";
            return payload; 

  - id: send_emergency
    parameters:
      message: string
    then:
      - http_request.send:
          method: PATCH
          url: !lambda |-
            return id(firebase_url_saved) + "/units/" + id(clean_mac) + "/alerts.json";
          body: !lambda |-
            return std::string("{\"last_emergency\":\"") + message + "\"}";

  - id: clear_emergency
    then:
      - http_request.send:
          method: DELETE
          url: !lambda |-
            return id(firebase_url_saved) + "/units/" + id(clean_mac) + "/alerts.json";

  - id: clear_firebase_command
    then:
      - http_request.send:
          method: DELETE
          url: !lambda |-
            return id(firebase_url_saved) + "/units/" + id(clean_mac) + "/command.json";

# --- TIME-BASED SYNC & POLLING ---
interval:
  - interval: 25s
    then:
      - script.execute: sync_status

  - interval: 5s
    then:
      - http_request.get:
          url: !lambda |-
            return id(firebase_url_saved) + "/units/" + id(clean_mac) + "/command.json";
          capture_response: true 
          on_response:
            then:
              - lambda: |-
                  if (body.length() < 10) return; 
                  JsonDocument doc; 
                  DeserializationError err = deserializeJson(doc, body);
                  if (!err && !doc["motor"].isNull()) {
                    // [Your existing motor control logic here]
                    id(clear_firebase_command).execute();
                  }
